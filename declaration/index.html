    :root {
      --bordo: #5E2F3A;
      --bordo-light: #7D4450;
      --sage: #4E6B42;
      --sage-light: #839E75;
      --amber: #E8AD4A;
      --bg: #FEFCF6;
      --text: #1a1a1a;
      --muted: #777;
      --border: #e2ddd5;
      --light: #f0ede6;
      color-scheme: light only;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Skip to content link for keyboard navigation */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 6px;
      background: var(--amber);
      color: var(--text);
      padding: 8px;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      z-index: 1000;
      transition: top 0.2s;
    }
    .skip-link:focus {
      top: 6px;
    }

    /* Header */
    .header {
      background: var(--bordo);
      color: #fff;
      padding: 1.25rem 2rem;
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .brand {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .brand:hover { opacity: 0.9; }
    .brand:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
      border-radius: 2px;
    }
    .brand-logo {
      width: 24px;
      height: 24px;
      filter: brightness(0) invert(1);
    }
    .brand-text {
      font-size: inherit;
    }
    nav { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .nav-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-link:hover { color: #fff; }
    .nav-link.active { color: #fff; border-bottom-color: #fff; }
    .nav-link:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* Hero */
    .hero {
      background: linear-gradient(180deg, var(--bordo) 0%, #3d1c24 100%);
      color: #fff;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }
    .hero-inner { max-width: 700px; margin: 0 auto; }
    .hero h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }
    .hero p {
      font-size: 1rem;
      opacity: 0.85;
      line-height: 1.6;
    }
    [lang="ru"] .hero h1 { font-family: 'Playfair Display', Georgia, serif; }

    /* Language tabs */
    .lang-tabs {
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      padding: 1rem 2rem 0;
      max-width: 860px;
      margin: 0 auto;
    }
    .lang-tab {
      background: none;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 0.5rem 1.25rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: color 0.2s, background 0.2s;
      min-height: 44px;
      min-width: 44px;
    }
    .lang-tab:hover { color: var(--text); background: var(--light); }
    .lang-tab.active {
      color: var(--bordo);
      background: var(--bg);
      border-color: var(--bordo);
      font-weight: 600;
    }
    .lang-tab:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
    }

    /* Content */
    .content, .declaration-content {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 2rem 3rem;
      border-top: 2px solid var(--bordo);
    }
    .lang-content { display: none; }
    .lang-content.active { display: block; }

    .content h2 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.3rem, 3vw, 1.6rem);
      font-weight: 400;
      color: var(--bordo);
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .content h2:first-child { margin-top: 0; }
    [data-lang="ru"] h2 { font-family: 'Playfair Display', Georgia, serif; }

    .content p {
      margin-bottom: 1rem;
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .content strong {
      color: var(--bordo);
      font-weight: 600;
    }

    /* Illustrations */
    .section-illustration {
      margin: 2rem 0;
      text-align: center;
    }
    .section-illustration img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .hero-illustration {
      max-width: 600px;
      width: 100%;
    }

    .principle {
      margin-bottom: 1.25rem;
      padding-left: 1rem;
      border-left: 3px solid var(--sage-light);
      position: relative;
    }
    .principle strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    .principle-icon {
      position: absolute;
      left: -2.25rem;
      top: 0.25rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--sage-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .principle-icon img {
      width: 20px;
      height: 20px;
    }

    /* Hero-06 closing with overlay */
    .closing-section {
      position: relative;
      margin: 3rem 0;
      text-align: center;
    }
    .closing-illustration {
      position: relative;
      display: inline-block;
      max-width: 600px;
      width: 100%;
    }
    .closing-illustration img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .closing-overlay {
      position: absolute;
      top: 15%;
      right: 5%;
      width: 28%;
      background: rgba(254, 252, 246, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 1rem;
      border: 1px solid rgba(125, 68, 80, 0.2);
    }
    .closing-overlay h3 {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--bordo);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    .closing-overlay p {
      font-size: 0.85rem;
      line-height: 1.4;
      margin: 0;
      color: var(--text);
    }

    /* CTA */
    .cta {
      text-align: center;
      margin: 3rem 0 1rem;
      padding: 2rem;
      background: var(--light);
      border-radius: 8px;
    }
    .cta-btn {
      display: inline-block;
      background: var(--bordo);
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s, transform 0.15s;
      min-height: 44px;
    }
    .cta-btn:hover { background: var(--bordo-light); transform: translateY(-1px); }
    .cta-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

    .print-btn {
      display: inline-block;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1.5rem;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: color 0.2s, border-color 0.2s;
      min-height: 44px;
    }
    .print-btn:hover { color: var(--text); border-color: var(--text); }
    .print-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

    /* Footer */
    .footer {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--bordo-light); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .footer a:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
      border-radius: 2px;
    }
    .footer-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .footer-logo {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    /* Ko-fi Support Button */
    .footer-support {
      margin: 1rem 0;
    }
    .kofi-support-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--amber);
      color: var(--text);
      text-decoration: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      box-shadow: 0 2px 4px rgba(232, 173, 74, 0.2);
      font-family: 'Inter', sans-serif;
    }
    .kofi-support-button:hover {
      background: #dfa143;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(232, 173, 74, 0.3);
    }
    .kofi-support-button:focus-visible {
      outline: 2px solid var(--bordo);
      outline-offset: 2px;
    }
    .kofi-emoji {
      font-size: 1rem;
      filter: grayscale(1) brightness(0.8);
    }
    .kofi-text {
      font-size: 0.85rem;
    }

    /* AI Transparency Notice */
    .ai-notice {
      background: var(--light);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Print */
    @media print {
      .header, .lang-tabs, .print-btn { display: none; }
      .footer p { display: none; }
      .footer .ai-notice { display: block; margin-bottom: 1rem; }
      .lang-content { display: block !important; }
      .lang-content:not(.active) { display: none !important; }
      .content { border-top: none; padding-top: 0; }
      .hero { background: none; color: var(--text); padding: 1rem 0; }
      .hero h1 { color: var(--bordo); }
      .cta { background: none; border: 1px solid var(--border); }
      .section-illustration, .closing-section { break-inside: avoid; }
      .principle { break-inside: avoid; }
      .principle-icon { position: static; display: inline-block; margin-right: 0.5rem; }
      .closing-overlay { position: static; background: var(--light); margin-top: 1rem; }
      body { font-size: 11pt; }
      h2 { break-after: avoid; }
      @page { margin: 2cm; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .principle-icon { display: none; }
      .principle { padding-left: 0.75rem; }
      .closing-overlay {
        position: static;
        width: auto;
        margin-top: 1rem;
        backdrop-filter: none;
        background: var(--light);
      }
    }

    @media (max-width: 600px) {
      .header { padding: 1rem; }
      .hero { padding: 2rem 1.25rem 1.5rem; }
      .content { padding: 1.5rem 1.25rem 2.5rem; }
      .lang-tabs { padding: 1rem 1.25rem 0; }
    }

</head>

    <!-- English Content -->
    <div class="lang-content active" data-lang="en">
      <blockquote>
        "I am, somehow, less interested in the weight and convolutions of Einstein's brain than in the near certainty that people of equal talent have lived and died in cotton fields and sweatshops."
        <br>— Stephen Jay Gould, <em>The Panda's Thumb</em> (1980)
      </blockquote>

      <hr>

      <h2>Preamble</h2>

      <p>Humanity has never had better tools for sharing knowledge. And yet, more of it is locked away than at any point in modern history. Paywalled. Gated by algorithms that serve ad revenue, not understanding. Treated as a commodity measured in clicks rather than clarity.</p>

      <p>This is the new enclosure.</p>

      <p>Centuries ago, common lands were fenced off from the people who tended them. Today, the same thing is happening to knowledge itself. Research that the public paid for sits behind subscription gates. Cultural heritage is buried in proprietary databases. Our attention — the hours we spend reading, searching, learning — has become a raw material to be extracted and sold.</p>

      <p>We reject this enclosure, and we are building something better.</p>

      <hr>

      <h2>Principles</h2>

      <div class="principle">
        <p><strong>I. Knowledge belongs to humanity.</strong></p>
        <p>Knowledge produced through public funding, shared inquiry, and collective cultural effort must remain accessible to all. No corporation or government may rightfully claim exclusive ownership over what communities, researchers, and cultures have built together. We respect intellectual property law while advocating for its reform where it fails the public interest.</p>
      </div>

      <div class="principle">
        <p><strong>II. Attention is sovereign.</strong></p>
        <p>Every person has the right to direct their own attention without manipulation. Systems designed to hijack attention through addictive loops, outrage amplification, or manufactured scarcity violate that right. Sovereign attention does not imply a right to amplification or freedom from accountability.</p>
        <p>The internet was built for dialogue — for people to exchange knowledge, challenge ideas, and learn from one another. Recommendation systems, designed to maximize engagement rather than understanding, have replaced this exchange with endless passive consumption. When an algorithm determines what you see next, your attention is no longer sovereign. It is harvested.</p>
      </div>

      <div class="principle">
        <p><strong>III. Creation must precede extraction.</strong></p>
        <p>Systems that produce nothing yet capture everything break the basic agreement that holds the commons together: you contribute before you take. An information economy that rewards enclosure over contribution undermines its own foundation.</p>
      </div>

      <div class="principle">
        <p><strong>IV. Transparency is non-negotiable.</strong></p>
        <p>Any system that shapes public knowledge — search engine, content platform, recommendation algorithm — must be subject to meaningful public accountability and independent audit. What cannot be examined cannot be trusted.</p>
      </div>

      <div class="principle">
        <p><strong>V. Access without surveillance.</strong></p>
        <p>The price of knowledge must never be the surrender of privacy. No one should be tracked, profiled, or monetized for the act of learning. Reading is not a transaction. Curiosity is not a data point.</p>
      </div>

      <div class="principle">
        <p><strong>VI. Local wisdom, global commons.</strong></p>
        <p>Cultural and community knowledge should flow freely across borders while respecting its origins. The encyclopedia of a village — its recipes, its remedies, its stories — belongs to the world. But the world must honor the village, with the informed consent and participation of its people. Open access is not extraction by another name.</p>
      </div>

      <div class="principle">
        <p><strong>VII. Building, not burning.</strong></p>
        <p>We construct alternatives within the law. We do not tear down what exists — we build what should exist alongside it. Our tools are transparency, cooperation, open standards, and the patient work of making knowledge accessible.</p>
      </div>

      <hr>

      <h2>What We Observe</h2>

      <p>The enclosure is not abstract. It is specific and measurable:</p>

      <ul>
        <li>Publicly funded research locked behind paywalls that charge the same taxpayers who funded it.</li>
        <li>Algorithms that amplify division because division drives engagement, and engagement drives revenue.</li>
        <li>Cultural heritage digitized by public institutions, then licensed exclusively to private platforms.</li>
        <li>Educational resources priced beyond the reach of the communities that need them most.</li>
        <li>Personal data harvested from every act of reading, searching, and learning — then sold to shape the very information we receive.</li>
        <li>Platforms originally built for human conversation, transformed into delivery systems where recommendation algorithms determine what millions read, watch, and believe — optimizing not for knowledge but for time spent.</li>
      </ul>

      <p>These are not inevitable consequences of technology. They are choices. And choices can be made differently.</p>

      <hr>

      <h2>Our Commitments</h2>

      <p>By endorsing this Declaration, we pledge to:</p>

      <ol>
        <li><strong>Create and share openly.</strong> Where we produce knowledge, we will make it accessible under open licenses that permit sharing, adaptation, and redistribution.</li>
        <li><strong>Respect the law and work within it.</strong> We do not advocate circumvention or destruction. We build legal, sustainable, open alternatives.</li>
        <li><strong>Protect privacy as a condition of access.</strong> We will not require surveillance as payment for knowledge.</li>
        <li><strong>Support open infrastructure</strong> — open-source tools, open standards, open protocols — that no single entity can enclose.</li>
        <li><strong>Demand transparency</strong> from systems that shape public knowledge, and practice it in our own work.</li>
        <li><strong>Navigate machine learning with principle.</strong> Open knowledge must not become a loophole for uncredited extraction by automated systems. We support transparent, fair frameworks for how knowledge trains technology — frameworks that respect creators and remain open to scrutiny.</li>
        <li><strong>Stand with those who lack access.</strong> The value of open knowledge is measured by who can reach it, not by who already has it.</li>
      </ol>

      <hr>

      <h2>A Call to Action</h2>

      <p>We invite every person and organization to endorse this Declaration.</p>

      <p>By adding your name, you join a growing community of builders: librarians, educators, researchers, developers, archivists, journalists, and citizens working to keep knowledge open. If your institution, project, or community shares these principles, make it official.</p>

      <p>Read the full text, add your signature, and share it: <strong>folkup.app/declaration</strong></p>

      <h2>Преамбула</h2>

      <p>У человечества никогда не было лучших инструментов для обмена знаниями. И всё же, больше знаний заперто, чем в любой момент современной истории. За платными барьерами. Ограничено алгоритмами, служащими доходам от рекламы, а не пониманию. К знанию относятся как к товару, измеряемому кликами, а не ясностью.</p>

      <p>Это новое огораживание.</p>

      <p>Века назад общие земли были отгорожены от людей, которые их обрабатывали. Сегодня то же самое происходит с самими знаниями. Исследования, финансируемые общественностью, находятся за подписными барьерами. Культурное наследие похоронено в проприетарных базах данных. Наше внимание — часы, которые мы тратим на чтение, поиск, обучение — стало сырьём для извлечения и продажи.</p>

      <p>Мы отвергаем это огораживание и строим что-то лучшее.</p>

      <hr>

      <h2>Принципы</h2>

      <div class="principle">
        <p><strong>I. Знание принадлежит человечеству.</strong></p>
        <p>Знания, полученные за счёт государственного финансирования, совместных исследований и коллективных культурных усилий, должны оставаться доступными для всех. Ни одна корпорация или правительство не может законно претендовать на исключительную собственность на то, что сообщества, исследователи и культуры построили вместе. Мы уважаем закон об интеллектуальной собственности, выступая за его реформу там, где он не служит общественным интересам.</p>
      </div>

      <div class="principle">
        <p><strong>II. Внимание суверенно.</strong></p>
        <p>Каждый человек имеет право направлять своё внимание без манипуляций. Системы, предназначенные для захвата внимания через петли зависимости, усиление возмущения или искусственный дефицит, нарушают это право. Суверенное внимание не подразумевает права на усиление или свободу от ответственности.</p>
        <p>Интернет был создан для диалога — чтобы люди обменивались знаниями, оспаривали идеи и учились друг у друга. Рекомендательные системы, предназначенные для максимизации вовлечённости, а не понимания, заменили этот обмен бесконечным пассивным потреблением. Когда алгоритм определяет, что вы увидите дальше, ваше внимание больше не суверенно. Оно собирается.</p>
      </div>

      <div class="principle">
        <p><strong>III. Создание должно предшествовать извлечению.</strong></p>
        <p>Системы, которые ничего не производят, но захватывают всё, нарушают основное соглашение, которое удерживает общее достояние вместе: вы вносите вклад, прежде чем брать. Информационная экономика, которая вознаграждает огораживание над вкладом, подрывает свою собственную основу.</p>
      </div>

      <div class="principle">
        <p><strong>IV. Прозрачность не подлежит обсуждению.</strong></p>
        <p>Любая система, которая формирует общественные знания — поисковая система, контентная платформа, алгоритм рекомендаций — должна подвергаться значимой общественной отчётности и независимому аудиту. То, что нельзя проверить, нельзя доверять.</p>
      </div>

      <div class="principle">
        <p><strong>V. Доступ без слежения.</strong></p>
        <p>Цена знания никогда не должна быть сдачей приватности. Никого не следует отслеживать, профилировать или монетизировать за акт обучения. Чтение — это не транзакция. Любопытство — это не точка данных.</p>
      </div>

      <div class="principle">
        <p><strong>VI. Местная мудрость, глобальное достояние.</strong></p>
        <p>Культурные и общинные знания должны свободно течь через границы, уважая их происхождение. Энциклопедия деревни — её рецепты, средства, истории — принадлежит миру. Но мир должен чтить деревню, с осознанного согласия и участием её жителей. Открытый доступ — это не извлечение под другим именем.</p>
      </div>

      <div class="principle">
        <p><strong>VII. Строительство, а не разрушение.</strong></p>
        <p>Мы строим альтернативы в рамках закона. Мы не сносим то, что существует — мы строим то, что должно существовать рядом с ним. Наши инструменты — прозрачность, сотрудничество, открытые стандарты и терпеливая работа по обеспечению доступности знаний.</p>
      </div>

      <hr>

      <h2>Что мы наблюдаем</h2>

      <p>Огораживание не абстрактно. Оно конкретно и измеримо:</p>

      <ul>
        <li>Государственно финансируемые исследования заперты за платными барьерами, которые взимают плату с тех же налогоплательщиков, которые их финансировали.</li>
        <li>Алгоритмы, которые усиливают разделение, потому что разделение стимулирует вовлечённость, а вовлечённость приносит доход.</li>
        <li>Культурное наследие, оцифрованное общественными институтами, затем лицензированное исключительно частным платформам.</li>
        <li>Образовательные ресурсы по цене, недоступной сообществам, которые больше всего в них нуждаются.</li>
        <li>Личные данные, собираемые с каждого акта чтения, поиска и обучения — затем продаваемые для формирования той самой информации, которую мы получаем.</li>
        <li>Платформы, изначально созданные для человеческого разговора, превращённые в системы доставки, где алгоритмы рекомендаций определяют, что миллионы читают, смотрят и во что верят — оптимизируя не знания, а проведённое время.</li>
      </ul>

      <p>Это не неизбежные последствия технологий. Это выборы. И выборы можно делать по-другому.</p>

      <hr>

      <h2>Наши обязательства</h2>

      <p>Поддерживая эту Декларацию, мы обязуемся:</p>

      <ol>
        <li><strong>Создавать и делиться открыто.</strong> Где мы производим знания, мы сделаем их доступными под открытыми лицензиями, которые разрешают обмен, адаптацию и перераспределение.</li>
        <li><strong>Уважать закон и работать в его рамках.</strong> Мы не выступаем за обход или разрушение. Мы строим законные, устойчивые, открытые альтернативы.</li>
        <li><strong>Защищать приватность как условие доступа.</strong> Мы не будем требовать слежения как плату за знания.</li>
        <li><strong>Поддерживать открытую инфраструктуру</strong> — инструменты с открытым исходным кодом, открытые стандарты, открытые протоколы — которые ни одна единственная организация не может огородить.</li>
        <li><strong>Требовать прозрачности</strong> от систем, которые формируют общественные знания, и практиковать её в нашей собственной работе.</li>
        <li><strong>Направлять машинное обучение с принципом.</strong> Открытые знания не должны становиться лазейкой для некредитованного извлечения автоматизированными системами. Мы поддерживаем прозрачные, справедливые структуры того, как знания обучают технологии — структуры, которые уважают создателей и остаются открытыми для проверки.</li>
        <li><strong>Стоять с теми, кто лишён доступа.</strong> Ценность открытых знаний измеряется тем, кто может их достичь, а не теми, кто уже их имеет.</li>
      </ol>

      <hr>

      <h2>Призыв к действию</h2>

      <p>Мы приглашаем каждого человека и организацию поддержать эту Декларацию.</p>

      <p>Добавив своё имя, вы присоединяетесь к растущему сообществу строителей: библиотекарей, преподавателей, исследователей, разработчиков, архивистов, журналистов и граждан, работающих над тем, чтобы знания оставались открытыми. Если ваше учреждение, проект или сообщество разделяют эти принципы, сделайте это официально.</p>

      <p>Прочитайте полный текст, добавьте свою подпись и поделитесь им: <strong>folkup.app/declaration</strong></p>

        "Eu estou, de alguma forma, menos interessado no peso e nas convoluções do cérebro de Einstein do que na quase certeza de que pessoas de igual talento viveram e morreram em plantações de algodão e fábricas de exploração."

      <hr>

      <h2>Preâmbulo</h2>

      <p>A humanidade nunca teve melhores ferramentas para partilhar conhecimento. E ainda assim, mais conhecimento está bloqueado do que em qualquer momento da história moderna. Atrás de paywalls. Controlado por algoritmos que servem receitas publicitárias, não compreensão. Tratado como uma commodity medida em cliques em vez de clareza.</p>

      <p>Esta é a nova cerca.</p>

      <p>Séculos atrás, as terras comuns foram vedadas às pessoas que as cultivavam. Hoje, a mesma coisa está acontecendo com o próprio conhecimento. Pesquisa que o público pagou fica atrás de portões de assinatura. O patrimônio cultural está enterrado em bases de dados proprietárias. A nossa atenção — as horas que passamos lendo, pesquisando, aprendendo — tornou-se uma matéria-prima a ser extraída e vendida.</p>

      <p>Rejeitamos esta cerca e estamos construindo algo melhor.</p>

      <hr>

      <h2>Princípios</h2>

      <div class="principle">
        <p><strong>I. O conhecimento pertence à humanidade.</strong></p>
        <p>O conhecimento produzido através de financiamento público, investigação partilhada e esforço cultural coletivo deve permanecer acessível a todos. Nenhuma corporação ou governo pode legitimamente reivindicar propriedade exclusiva sobre o que comunidades, investigadores e culturas construíram juntos. Respeitamos a lei de propriedade intelectual enquanto defendemos a sua reforma onde falha o interesse público.</p>
      </div>

      <div class="principle">
        <p><strong>II. A atenção é soberana.</strong></p>
        <p>Toda pessoa tem o direito de direcionar a sua própria atenção sem manipulação. Sistemas projetados para sequestrar atenção através de loops viciantes, amplificação de indignação ou escassez fabricada violam esse direito. Atenção soberana não implica um direito à amplificação ou liberdade de responsabilidade.</p>
        <p>A internet foi construída para diálogo — para as pessoas trocarem conhecimento, desafiarem ideias e aprenderem uns com os outros. Sistemas de recomendação, projetados para maximizar engajamento em vez de compreensão, substituíram essa troca por consumo passivo infinito. Quando um algoritmo determina o que você vê a seguir, a sua atenção já não é soberana. É colhida.</p>
      </div>

      <div class="principle">
        <p><strong>III. A criação deve preceder a extração.</strong></p>
        <p>Sistemas que não produzem nada mas capturam tudo quebram o acordo básico que mantém os comuns unidos: você contribui antes de tomar. Uma economia de informação que recompensa a cerca sobre a contribuição mina a sua própria fundação.</p>
      </div>

      <div class="principle">
        <p><strong>IV. A transparência é inegociável.</strong></p>
        <p>Qualquer sistema que molde o conhecimento público — motor de busca, plataforma de conteúdo, algoritmo de recomendação — deve estar sujeito a responsabilidade pública significativa e auditoria independente. O que não pode ser examinado não pode ser confiável.</p>
      </div>

      <div class="principle">
        <p><strong>V. Acesso sem vigilância.</strong></p>
        <p>O preço do conhecimento nunca deve ser a rendição da privacidade. Ninguém deve ser rastreado, perfilado ou monetizado pelo ato de aprender. Ler não é uma transação. Curiosidade não é um ponto de dados.</p>
      </div>

      <div class="principle">
        <p><strong>VI. Sabedoria local, bens comuns globais.</strong></p>
        <p>O conhecimento cultural e comunitário deve fluir livremente através das fronteiras, respeitando as suas origens. A enciclopédia de uma aldeia — as suas receitas, os seus remédios, as suas histórias — pertence ao mundo. Mas o mundo deve honrar a aldeia, com o consentimento informado e a participação do seu povo. Acesso aberto não é extração com outro nome.</p>
      </div>

      <div class="principle">
        <p><strong>VII. Construir, não queimar.</strong></p>
        <p>Construímos alternativas dentro da lei. Não derrubamos o que existe — construímos o que deve existir ao lado disso. As nossas ferramentas são transparência, cooperação, padrões abertos e o trabalho paciente de tornar o conhecimento acessível.</p>
      </div>

      <hr>

      <h2>O que observamos</h2>

      <p>A cerca não é abstrata. É específica e mensurável:</p>

      <ul>
        <li>Pesquisa financiada publicamente bloqueada atrás de paywalls que cobram dos mesmos contribuintes que a financiaram.</li>
        <li>Algoritmos que amplificam a divisão porque a divisão impulsiona o engajamento, e o engajamento gera receita.</li>
        <li>Patrimônio cultural digitalizado por instituições públicas, depois licenciado exclusivamente para plataformas privadas.</li>
        <li>Recursos educacionais com preços além do alcance das comunidades que mais precisam deles.</li>
        <li>Dados pessoais colhidos de cada ato de leitura, pesquisa e aprendizagem — depois vendidos para moldar a própria informação que recebemos.</li>
        <li>Plataformas originalmente construídas para conversação humana, transformadas em sistemas de entrega onde algoritmos de recomendação determinam o que milhões leem, assistem e acreditam — otimizando não para conhecimento mas para tempo gasto.</li>
      </ul>

      <p>Estas não são consequências inevitáveis da tecnologia. São escolhas. E as escolhas podem ser feitas de forma diferente.</p>

      <hr>

      <h2>Os nossos compromissos</h2>

      <p>Ao endossar esta Declaração, comprometemo-nos a:</p>

      <ol>
        <li><strong>Criar e partilhar abertamente.</strong> Onde produzimos conhecimento, vamos torná-lo acessível sob licenças abertas que permitam partilha, adaptação e redistribuição.</li>
        <li><strong>Respeitar a lei e trabalhar dentro dela.</strong> Não defendemos contorno ou destruição. Construímos alternativas legais, sustentáveis e abertas.</li>
        <li><strong>Proteger a privacidade como condição de acesso.</strong> Não vamos exigir vigilância como pagamento pelo conhecimento.</li>
        <li><strong>Apoiar infraestrutura aberta</strong> — ferramentas de código aberto, padrões abertos, protocolos abertos — que nenhuma entidade única pode cercar.</li>
        <li><strong>Exigir transparência</strong> dos sistemas que moldam o conhecimento público, e praticá-la no nosso próprio trabalho.</li>
        <li><strong>Navegar na aprendizagem automática com princípio.</strong> O conhecimento aberto não deve tornar-se uma brecha para extração sem crédito por sistemas automatizados. Apoiamos estruturas transparentes e justas para como o conhecimento treina tecnologia — estruturas que respeitam criadores e permanecem abertas ao escrutínio.</li>
        <li><strong>Ficar com aqueles que carecem de acesso.</strong> O valor do conhecimento aberto é medido por quem pode alcançá-lo, não por quem já o tem.</li>
      </ol>

      <hr>

      <h2>Um apelo à ação</h2>

      <p>Convidamos toda pessoa e organização a endossar esta Declaração.</p>

      <p>Ao adicionar o seu nome, junta-se a uma comunidade crescente de construtores: bibliotecários, educadores, investigadores, desenvolvedores, arquivistas, jornalistas e cidadãos trabalhando para manter o conhecimento aberto. Se a sua instituição, projeto ou comunidade partilha estes princípios, torne-o oficial.</p>

      <p>Leia o texto completo, adicione a sua assinatura e partilhe-o: <strong>folkup.app/declaration</strong></p>

    // Language switching functionality
    function switchLanguage(lang) {
      // Update all language content
      document.querySelectorAll('.lang-content').forEach(el => {
        el.style.display = el.getAttribute('data-lang') === lang ? 'block' : 'none';
      });

      // Update active tab
      document.querySelectorAll('.lang-tab').forEach(tab => {
        tab.classList.toggle('active', tab.getAttribute('data-lang') === lang);
      });

      // Store preference
      localStorage.setItem('preferredLanguage', lang);

      // Update URL without reload
      const url = new URL(window.location);
      if (lang !== 'en') {
        url.pathname = `/${lang}/`;
      } else {
        url.pathname = '/';
      }
      window.history.pushState({lang}, '', url);

      // Update page language attribute
      document.documentElement.lang = lang;
    }

    function detectLanguageFromURL() {
      const path = window.location.pathname;
      if (path.startsWith('/ru')) return 'ru';
      if (path.startsWith('/pt')) return 'pt';
      return 'en';
    }

    function init() {
      // Set up language tab clicks
      document.querySelectorAll('.lang-tab').forEach(tab => {
        tab.addEventListener('click', () => switchLanguage(tab.getAttribute('data-lang')));
      });

      // Initialize language from URL or storage
      const urlLang = detectLanguageFromURL();
      const storedLang = localStorage.getItem('preferredLanguage');
      const initialLang = urlLang !== 'en' ? urlLang : (storedLang || 'en');
      switchLanguage(initialLang);
    }

    // Browser back/forward support
    window.addEventListener('popstate', function(e) {
      const lang = e.state?.lang || detectLanguageFromURL();
      switchLanguage(lang);
    });

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
