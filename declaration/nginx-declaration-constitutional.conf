# nginx Virtual Host Configuration for declaration.folkup.app
# Enhanced Alice v2.0 Level 3 Constitutional Security Framework
# GDPR Article 8 Compliant Educational Platform Configuration

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name declaration.folkup.app;

    # Security headers even for redirects
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    return 301 https://$server_name$request_uri;
}

# GDPR Article 8 Compliant Anonymized Logging
map $remote_addr $remote_addr_anon {
    ~(?P<ip>\d+\.\d+\.\d+)\.\d+ $ip.0;
    default 0.0.0.0;
}

log_format gdpr_compliant '$remote_addr_anon - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent"';

# HTTPS Virtual Host - Constitutional Security Standards
server {
    listen 443 ssl http2;
    server_name declaration.folkup.app;

    # Document Root
    root /var/www/declaration.folkup.app/html;
    index index.html;

    # GDPR Article 8 Compliant Logging
    access_log /var/log/nginx/declaration.folkup.app.access.log gdpr_compliant;
    error_log /var/log/nginx/declaration.folkup.app.error.log warn;

    # SSL Configuration - Constitutional Grade Security
    ssl_certificate /etc/letsencrypt/live/declaration.folkup.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/declaration.folkup.app/privkey.pem;

    # Modern SSL/TLS Configuration (2026 Standards)
    ssl_protocols TLSv1.2 TLSv1.3;

    # COOPER HARDENING: DHE ciphers removed, ECDHE only
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_ecdh_curve secp384r1;

    # COOPER HARDENING: OCSP Stapling with timeout protection
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_stapling_responder_timeout 5s;
    ssl_trusted_certificate /etc/letsencrypt/live/declaration.folkup.app/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # SSL Session Configuration
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Diffie-Hellman Parameters
    ssl_dhparam /etc/nginx/dhparam.pem;

    # Constitutional Security Headers Framework
    # GDPR Article 8 Enhanced Protection for Educational Platform
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # COOPER HARDENING: Nonce-based CSP for Educational Platform
    # Generate unique nonce for each request
    set $csp_nonce $request_id;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$csp_nonce' formsubmit.co ko-fi.com cdn.ko-fi.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: ko-fi.com cdn.ko-fi.com; connect-src 'self' formsubmit.co ko-fi.com; frame-src ko-fi.com; base-uri 'self'; form-action 'self' formsubmit.co; upgrade-insecure-requests" always;

    # Educational Platform Privacy Headers
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Main location block
    location / {
        try_files $uri $uri/ @clean_urls;

        # Enhanced caching for static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            gzip_static on;
        }
    }

    # Clean URLs implementation
    location @clean_urls {
        # Clean URL rewrites from netlify.toml
        rewrite ^/privacy$ /privacy.html last;
        rewrite ^/terms$ /terms.html last;
        rewrite ^/cookies$ /cookies.html last;
        return 404;
    }

    # Explicit clean URL routes
    location = /privacy {
        try_files /privacy.html =404;
    }

    location = /terms {
        try_files /terms.html =404;
    }

    location = /cookies {
        try_files /cookies.html =404;
    }

    # COOPER HARDENING: Enhanced file access controls
    # Block all hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # COOPER HARDENING: Block backup and temporary files
    location ~* \.(bak|backup|old|tmp|temp|log|conf|config|sql|dump|tar|gz|zip|rar|7z)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block editor temporary files
    location ~* \.(swp|swo|~|#.*#|.*~)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # COOPER HARDENING: Custom error pages with information disclosure protection
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Ensure error pages don't leak server information
    location = /404.html {
        internal;
        root /var/www/declaration.folkup.app/html;
    }

    location = /50x.html {
        internal;
        root /var/www/declaration.folkup.app/html;
    }

    # Security: Prevent access to nginx config files
    location ~ /nginx\.conf {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Educational Platform: Health Check Endpoint
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}

# Constitutional Compliance Notes:
# 1. GDPR Article 8: IP address anonymization for educational platform
# 2. Enhanced file access controls prevent information disclosure
# 3. Nonce-based CSP eliminates XSS via unsafe-inline
# 4. DHE ciphers removed to prevent Logjam attacks
# 5. OCSP stapling timeout prevents DoS-based availability attacks
# 6. Educational platform specific headers for minor protection
# 7. Banking-level error handling prevents information leakage