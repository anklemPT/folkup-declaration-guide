[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Security headers for GDPR compliance and EU standards
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' formsubmit.co ko-fi.com cdn.ko-fi.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: ko-fi.com cdn.ko-fi.com; connect-src 'self' formsubmit.co ko-fi.com; frame-src ko-fi.com"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[context.production]
  command = "echo 'Production deployment for declaration.folkup.app emergency restoration'"

# Clean URLs
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/cookies"
  to = "/cookies.html"
  status = 200