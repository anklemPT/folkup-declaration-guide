server {
    listen 80;
    server_name declaration.folkup.app;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # MIME type for HTML files
    location ~* \.html$ {
        add_header Content-Type "text/html; charset=utf-8";
        expires 1d;
    }

    # Clean URLs for legal pages - redirect non-slash to slash versions
    location = /privacy {
        return 301 /privacy/;
    }

    location = /terms {
        return 301 /terms/;
    }

    location = /cookies {
        return 301 /cookies/;
    }

    # Sign-up page endpoint (no trailing slash required)
    location = /sign {
        try_files /sign.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Thank you pages for form submissions
    location = /thank-you-en.html {
        try_files /thank-you-en.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /thank-you-pt.html {
        try_files /thank-you-pt.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /thank-you-ru.html {
        try_files /thank-you-ru.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Clean URLs for legal pages (priority rules with trailing slashes)
    location = /privacy/ {
        try_files /privacy.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /terms/ {
        try_files /terms.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /cookies/ {
        try_files /cookies.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # i18n URL Routing
    # Default language (English) - root path serves index.html
    location = / {
        try_files /index.html =404;
    }

    # Russian language - /ru/ serves index.html with Russian content
    location = /ru/ {
        try_files /index.html =404;
    }

    # Portuguese language - /pt/ serves index.html with Portuguese content
    location = /pt/ {
        try_files /index.html =404;
    }

    # Student Guide paths
    location = /guide/ {
        try_files /guide/index.html =404;
    }

    location = /guide/ru/ {
        try_files /guide/index.html =404;
    }

    location = /guide/pt/ {
        try_files /guide/index.html =404;
    }

    # Backward compatibility redirects for old URL structure
    location /declaration/ru/ {
        return 301 /ru/;
    }

    location /declaration/pt/ {
        return 301 /pt/;
    }

    location /declaration/ {
        return 301 /;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|webp|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # Legal pages (.html versions for direct access)
    location ~* ^/(privacy|terms|cookies)\.html$ {
        try_files $uri =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Error pages
    error_page 404 /index.html;

    # Disable access log for common files to reduce noise
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}