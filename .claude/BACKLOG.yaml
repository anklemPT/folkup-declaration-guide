    - `vault/.git/hooks/pre-commit` Check 4 â€” added sed pre-filter on $content immediately after the INFR-268 .gitignore special-case, before the AI-tool regex check. The filter strips `\bCLAUDE\.local\.md\b`, `\bCLAUDE\.md\b`, `\bMEMORY\.md\b`, `\bSESSION_CONTEXT[^[:space:]]*`, and `\.claude/` (case-insensitive where appropriate) from the in-memory $content variable. Underlying file is NOT modified.
    - `vault/.git/hooks/commit-msg` â€” same sed pre-filter applied to $COMMIT_MSG â†’ $COMMIT_MSG_FILTERED before the AI-tool regex check. Co-Authored-By scan still runs against the unfiltered $COMMIT_MSG (different policy axis, always blocked).

    Smoke 16/16 PASS:
