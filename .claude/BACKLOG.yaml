    รยพรโรยดรยตรยปรลรยฝรโนรยน รโฌรยฐรยทรยดรยตรยป? รยงรโรยพรยฑรโน รโกรโรยตรยฝรยธรลฝ รยฝรยต รยผรยตรหรยฐรยปรยพ รยฝรยธรโกรยตรยณรยพ? รลธรฦรยรโรล รลกรยธรยฑรยตรโฌรโรยพรยฝรยทรยพ รยฟรโฌรยพรยฒรยตรยดรโรโ
    รโฌรยตรยรโรโฌรโก รยบรยพรยฝรยบรฦรโฌรยตรยฝรโรยพรยฒรยป.

    PROBLEM:
    รยขรยตรยบรฦรโฐรยฐรย รยรโรโฌรฦรยบรโรฦรโฌรยฐ รยรยผรยตรหรยธรยฒรยฐรยตรโ narrative chapters รย editorial apparatus:
    - Frontmatter footer รยฝรยฐ รยณรยปรยฐรยฒรยฐรโฆ: status badge, confidence, sources[], reviewed_by
    - Inline footnotes รย รยฒรยตรโฌรยธรโรยธรยบรยฐรโ รยธรยพรยฝรยฝรโนรยผรยธ รยดรยฐรโรยฐรยผรยธ
    - Editorial workflow / AI Transparency footer
    - Methodology references inside chapter prose

    HYPOTHESIS:
    รโรโนรยดรยตรยปรยธรโรล **รโรยตรโฆรยฝรยธรโกรยตรยรยบรยธรยน รยฐรยฟรยฟรยฐรโฌรยฐรโ** รยฒ รยพรโรยดรยตรยปรลรยฝรโนรยน รโฌรยฐรยทรยดรยตรยป `/apparatus/` รยธรยปรยธ
