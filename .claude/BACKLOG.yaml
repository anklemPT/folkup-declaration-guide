    ARCHITECTURE CORRECTION 2026-04-26: prior 2026-04-25 evidence รยพรหรยธรยฑรยพรโกรยฝรยพ รโรโฌรยตรยฑรยพรยฒรยฐรยปรยฐ "Cloudflare cache purge" รขโฌโ
    recheck รยฟรยพรยบรยฐรยทรยฐรยป CF proxy OFF รยฝรยฐ subdomains per vault/memory/infra.md:56-75 (Let's Encrypt cert constraint).
    รยญรยผรยฟรยธรโฌรยธรโกรยตรยรยบรยธ: curl -sI server:nginx, no cf-ray, direct Hetzner IP. INFR-287 รขโ โ obsolete same-date.
    Lesson captured: feedback_verify_cf_proxy_state_before_purge_plan.md.
  notes: |
    EVIDENCE: _meta/agil-118-dark-broken-screenshot.png (รยถรยธรยฒรยพรยน รยรยบรโฌรยธรยฝรหรยพรโ /chapters/chapter-3-holmes/ รยฒ dark mode รขโฌโ body text รยฟรยพรโกรโรยธ รยรยปรยธรยฒรยฐรยตรโรยรย รย รโรยพรยฝรยพรยผ, รยทรยฐรยณรยพรยปรยพรยฒรยบรยธ รโรยพรยฝรยบรยธรยต).

    ROOT-CAUSE รยณรยธรยฟรยพรโรยตรยทรโน (รโรโฌรยตรยฑรฦรลฝรโ diagnose):
    (1) AGIL-114 A7 WCAG math 10/10 PASS รยพรยฟรยธรโฌรยฐรยปรยรย รยฝรยฐ รยฟรยฐรยปรยธรโรโฌรฦ palette-d.css :root .dark รยฑรยปรยพรยบ, รยฝรยพ รโฌรยตรยฐรยปรลรยฝรยพ รยฝรยฐ rendered รยรโรโฌรยฐรยฝรยธรโ รยต รยฟรโฌรยธรยผรยตรยฝรยรลฝรโรยรย รโรย รยฃรโรหรโข รยทรยฝรยฐรโกรยตรยฝรยธรย (compat bridge override / specificity / inheritance).
    (2) Font-weight Playfair / typography-classical รยฒ .dark รโรยตรโฌรยรยตรโ รยฒรยตรย (light-shift), รยฒรยธรยทรฦรยฐรยปรลรยฝรโนรยน contrast รยฟรยฐรยดรยฐรยตรโ รยฝรยตรยรยผรยพรโรโฌรย รยฝรยฐ รยบรยพรโฌรโฌรยตรยบรโรยฝรโนรยน hex.
    (3) opacity: รยฝรยฐ body รยธรยปรยธ รยบรยพรยฝรโรยตรยฝรโรยฝรโนรโฆ รยบรยปรยฐรยรยรยฐรโฆ รยฟรโฌรยธรยผรยตรยฝรยรยตรโรยรย รยทรยฝรยฐรโกรยตรยฝรยธรยต <1 รยฒ .dark รขโฌโ math รยฝรยต รฦรโกรยปรยฐ.
    (4) AGIL-117 triple-selector รยรโฌรยฐรยฑรยพรโรยฐรยป, รยฝรยพ รยบรยฐรยบรยพรยน-รโรยพ รยรโรยธรยปรล รยฒรโนรหรยต รยฟรยพ cascade รยฟรยตรโฌรยตรยพรยฟรโฌรยตรยดรยตรยปรยรยตรโ รโ รยฒรยตรโ รยฝรยฐ รยฑรยปรยธรยทรยบรยธรยน รยบ รโรยพรยฝรฦ (tailwind hx:dark:* รยบรยปรยฐรยรยรโน Hextra?).

    SCOPE FIX:
    A. Diagnose รขโฌโ DOM inspection รโกรยตรโฌรยตรยท rendered HTML + computed CSS รยฝรยฐ รยรยตรโฌรยฒรยตรโฌรยต (curl + grep classes). รหรยดรยตรยฝรโรยธรโรยธรโ รยธรโฌรยพรยฒรยฐรโรล รยธรยรโรยพรโกรยฝรยธรยบ washed-out text.
    B. Patch รขโฌโ รฦรยฒรยตรยปรยธรโกรยธรโรล รยบรยพรยฝรโรโฌรยฐรยรโ body text รยดรยพ WCAG AAA-รฦรโฌรยพรยฒรยฝรย (รขโฐยฅ7:1), รยฝรยต AA (รขโฐยฅ4.5:1), รยฟรยพรโรยพรยผรฦ รโกรโรยพ AA รยฟรโฌรยพรโฆรยพรยดรยธรยปรยฐ รยฐ รยถรยธรยฒรลรโรยผ รยฝรยต รโกรยธรโรยฐรยตรโรยรย. Brand Guide v2.5 .dark scope.
    C. Verify รขโฌโ Playwright visual regression (รโกรยฐรยรโรล AGIL-122).

    BLOCKING: P0, รยผรยพรยฝรยพรยณรโฌรยฐรโ รยฝรยตรโกรยธรโรยฐรยตรยผ รยฒ dark mode รยฝรยฐ production.

