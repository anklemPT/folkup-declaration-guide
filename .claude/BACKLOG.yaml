    ГўЕ“вҖҰ Batch 8 (2026-04-20) ГўвӮ¬вҖқ retro-audit OP_030_TOKARNAYA v2.0 (Г‘вӮ¬ГҗВөГҗВ·Г‘Е’ГҗВұГҗВҫГҗВІГ‘вҖ№ГҗВө ГҗВҝГҗВөГ‘вӮ¬ГҗВөГ‘вҖҰГҗВҫГҗВҙГ‘вҖ№ Г‘Ж’ГҗВҙГҗВ°ГҗВ»ГҗВөГҗВҪГ‘вҖ№ ГўвӮ¬вҖқ single source OP_048 Г‘вҖЎГҗВ°Г‘ВҒГ‘вҖҡГ‘Е’ A; ГҗВҙГҗВҫГҗВұГҗВ°ГҗВІГҗВ»ГҗВөГҗВҪГ‘вҖ№ Г‘вҖҡГҗВҫГ‘вӮ¬Г‘вҖ ГҗВөГҗВІГҗВ°ГҗВҪГҗВёГҗВө ГҗВІ Г‘вӮ¬ГҗВ°ГҗВ·ГҗВјГҗВөГ‘вӮ¬ ГҗВё ГҗВҫГҗВұГҗВҫГҗВұГ‘вҖ°Г‘вҖҳГҗВҪГҗВҪГ‘вҖ№ГҗВө Г‘вҖһГҗВ°Г‘ВҒГҗВәГҗВё ГҗВҝГҗВҫ DENIS:119-120; ГҗВҫГ‘вҖҡГ‘вӮ¬ГҗВөГҗВ·ГҗВ°ГҗВҪГҗВёГҗВө ГҗВјГҗВөГ‘вӮ¬ГҗВҪГ‘вҖ№Г‘вҖҰ ГҗВ·ГҗВ°ГҗВіГҗВҫГ‘вҖҡГҗВҫГҗВІГҗВҫГҗВә ГҗВқГҗвҖў ГҗВҙГҗВҫГҗВұГҗВ°ГҗВІГҗВ»ГҗВөГҗВҪГҗВҫ ГҗВІГҗВҫ ГҗВёГҗВ·ГҗВұГҗВөГҗВ¶ГҗВ°ГҗВҪГҗВёГҗВө ГҗВҙГ‘Ж’ГҗВұГҗВ»Г‘ВҸ Г‘ВҒ OP_012 ГўвӮ¬вҖқ ГҗВұГҗВ»ГҗВҫГҗВәГҗВөГ‘вӮ¬ Alpha, Q-P4-003 ГҗВәГҗВ»ГҗВёГҗВөГҗВҪГ‘вҖҡГ‘Ж’; placeholder ГҗВІГҗВјГҗВөГ‘ВҒГ‘вҖҡГҗВҫ 16ГҗЕЎ20; ГҗвҖңГҗЕҫГҗВЎГҗВў ГҗВёГҗВҪГ‘ВҒГ‘вҖҡГ‘вӮ¬Г‘Ж’ГҗВјГҗВөГҗВҪГ‘вҖҡГҗВ° ГҗВұГҗВөГҗВ· witness Г‘Ж’ГҗВҙГҗВ°ГҗВ»ГҗВөГҗВҪГ‘вҖ№) + ГҗВҝГҗВҫГҗВ»ГҗВҪГҗВ°Г‘ВҸ ГҗВҝГҗВөГ‘вӮ¬ГҗВөГҗВ·ГҗВ°ГҗВҝГҗВёГ‘ВҒГ‘Е’ OP_040_GIBOCHNAYA v2.0 (scope ГҗВ·ГҗВ°ГҗВјГҗВөГҗВҪГ‘вҖҳГҗВҪ ГҗВҪГҗВ° ГҗВіГҗВёГҗВұГҗВәГ‘Ж’ ГҗВҝГ‘вӮ¬Г‘Ж’Г‘вҖҡГҗВәГҗВ° ГҗВҪГҗВөГ‘вӮ¬ГҗВ¶ D5 ГҗВҝГҗВҫ DENIS:122-123; watermark ГӮВ«AWAITING CLIENT CONFIRMATIONГӮВ»; Г‘ВҒГ‘вҖҡГ‘вӮ¬Г‘Ж’ГҗВәГ‘вҖҡГ‘Ж’Г‘вӮ¬ГҗВ° ГҗВіГ‘вӮ¬Г‘Ж’ГҗВҝГҗВҝ A/B/C ГўвӮ¬вҖқ pending Q-P4-004; ГҗЛң2220 ГҗВқГҗвҖў ГҗВҝГ‘вӮ¬ГҗВёГҗВјГҗВөГҗВҪГҗВёГҗВј ГўвҖ вҖҷ placeholder ГҗВёГҗВҪГ‘ВҒГ‘вҖҡГ‘вӮ¬Г‘Ж’ГҗВјГҗВөГҗВҪГ‘вҖҡГҗВ°; ГҗВҪГҗВҫГ‘вӮ¬ГҗВјГҗВ°Г‘вҖҡГҗВёГҗВІГҗВҪГҗВ°Г‘ВҸ ГҗВұГҗВ°ГҗВ·ГҗВ° 3.1118-82 + 3.1129-93; ГҗвҖңГҗЕҫГҗВЎГҗВў 3.1406-86 ГҗВәГҗВ°ГҗВә scope-Г‘Ж’ГҗВҝГҗВҫГҗВјГҗВёГҗВҪГҗВ°ГҗВҪГҗВёГҗВө Г‘ВҒ transitive witness; Г‘ВҒГ‘вҖҡГҗВ°Г‘вӮ¬Г‘вҖ№ГҗВө ГҗВҙГҗВөГ‘вҖҡГҗВ°ГҗВ»ГҗВё ГўвҖ вҖҷ OP_042/045 ГҗВјГҗВёГҗВіГ‘вӮ¬ГҗВ°Г‘вҖ ГҗВёГ‘ВҸ pending Batch 9+). Sidecar v1.7ГўвҖ вҖҷv1.8: applicability 3.1404-86 OP_030 ГўвҖ вҖҷ ГӮВ«v2.0 retro-auditedГӮВ»; 24705-2004 coverage 2ГўвҖ вҖҷ1 (OP_030 Г‘Ж’ГҗВҙГҗВ°ГҗВ»Г‘вҖҳГҗВҪ); equipment_legacy 16ГҗЕЎ20 retro-audited; ГҗВҪГҗВҫГҗВІГҗВ°Г‘ВҸ Г‘ВҒГҗВөГҗВәГ‘вҖ ГҗВёГ‘ВҸ