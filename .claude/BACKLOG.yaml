    On success: Г‘Ж’ГҗВұГ‘вӮ¬ГҗВ°Г‘вҖҡГ‘Е’ ГўЕЎВ  Status-ГҗВјГҗВ°Г‘вӮ¬ГҗВәГҗВөГ‘вӮ¬ ГҗВІ rules/token-optimization.md ГӮВ«/btw ГҗВҙГҗВ»Г‘ВҸ side-questionsГӮВ», ГҗВ·ГҗВ°ГҗВҙГҗВ°Г‘вҖЎГҗВ° done.
    On failure: ГҗВ·ГҗВ°Г‘вҖһГҗВёГҗВәГ‘ВҒГҗВёГ‘вӮ¬ГҗВҫГҗВІГҗВ°Г‘вҖҡГ‘Е’ Г‘вҖҡГҗВҫГ‘вҖЎГҗВҪГ‘вҖ№ГҗВ№ Г‘вӮ¬ГҗВөГҗВ¶ГҗВёГҗВј ГҗВҪГҗВөГ‘ВҒГҗВҫГҗВІГҗВјГҗВөГ‘ВҒГ‘вҖҡГҗВёГҗВјГҗВҫГ‘ВҒГ‘вҖҡГҗВё ГҗВІ notes, ГҗВҝГ‘вӮ¬ГҗВ°ГҗВІГҗВёГҗВ»ГҗВҫ ГҗВҫГ‘ВҒГ‘вҖҡГҗВ°ГҗВІГҗВёГ‘вҖҡГ‘Е’ Г‘ВҒ Г‘ВҒГ‘вҖҡГҗВ°Г‘вҖҡГ‘Ж’Г‘ВҒГҗВҫГҗВј advisory.

