    รโรยปรยฐรยฒรโน รยพรยรโรยฐรลฝรโรยรย รยซรโกรยธรยรโรโนรยผรยธรยป รขโฌโ รโรยพรยปรลรยบรยพ narrative + inline footnotes ะดะปัย cited sources.

