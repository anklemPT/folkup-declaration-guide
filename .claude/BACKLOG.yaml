    รย รยฐรยรหรยธรโฌรยตรยฝรยฝรโนรยน รยรยบรยพรฦรยฟ AGIL-119 = 3 sub-tasks:
    (a) Theme toggle 2-state (light/dark) รขโฌโ pill style รยฟรยพ LangToggle.vue รยฟรยฐรโรโรยตรโฌรยฝรฦ, replicated as Hugo partial + vanilla JS
