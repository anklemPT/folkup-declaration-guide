        - Pill buttons RU/EN, font-family var(--font-body), 0.8rem, weight 500, letter-spacing 0.05em
        - 44ร44 min touch target, padding 0.35rem 0.65rem, border-radius 4px
        - Border var(--color-border), background transparent, color var(--color-muted)
