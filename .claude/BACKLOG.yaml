- id: AGIL-084
  project: AGIL
  title: "Double HSTS header (nginx-sapiens + nginx-proxy default)"
  priority: P3
  status: obsolete
  obsoleted_by: INFR-275
  obsoleted_date: '2026-04-23'
  obsoleted_reason: 'Scope elevated from per-site fix to ecosystem-wide unification (unified vhost.d _common-security-headers.conf for all 7 FolkUp vhosts) per Андрей directive 2026-04-23 + Architect/Stoker/Cooper expert panel consensus. Original per-sapiens fix approach superseded by unified template approach — same problem solved more comprehensively.'
  category: infra
  notes: 'curl -I returns TWO Strict-Transport-Security headers: nginx-sapiens.conf emits "max-age=63072000; includeSubDomains; preload" and nginx-proxy default emits "max-age=31536000". Browsers accept first (longer one), but cleanliness requires single header. Fix: either remove HSTS from nginx-sapiens.conf (rely on nginx-proxy default — but loses preload directive) OR override nginx-proxy default for sapiens vhost. Surfaced during AGIL-072 pre-release verification. RESOLUTION 2026-04-23: elevated to INFR-275 as ecosystem-wide unification.'
