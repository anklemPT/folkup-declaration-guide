    4. `/config` ГўвҖ вҖҷ ГҗВҪГҗВ°ГҗВ№Г‘вҖҡГҗВё toggle ГӮВ«Side questionsГӮВ» (ГҗВёГҗВ»ГҗВё Г‘ВҚГҗВәГҗВІГҗВёГҗВІГҗВ°ГҗВ»ГҗВөГҗВҪГ‘вҖҡ)
