  notes: 'curl -I returns TWO Strict-Transport-Security headers: nginx-sapiens.conf emits "max-age=63072000; includeSubDomains; preload" and nginx-proxy default emits "max-age=31536000". Browsers accept first (longer one), but cleanliness requires single header. Fix: either remove HSTS from nginx-sapiens.conf (rely on nginx-proxy default ГўвӮ¬вҖқ but loses preload directive) OR override nginx-proxy default for sapiens vhost. Surfaced during AGIL-072 pre-release verification. RESOLUTION 2026-04-23: elevated to INFR-275 as ecosystem-wide unification.'
