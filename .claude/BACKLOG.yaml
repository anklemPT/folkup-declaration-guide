    Shipped 2026-04-22 as 3 signed commits:
    - c6abf84 ГўвӮ¬вҖқ nginx.conf allowlist (WG 10.0.0.0/24 + home 2.207.72.42/32 + loopback 127.0.0.1/32 + deny all) + set_real_ip_from 172.19.0.11/32 (narrow trust, exact nginx-proxy IP on Docker web network)
    - 6ec1c6b ГўвӮ¬вҖқ deploy.yaml health check inverted (external curl from runner expects 403; container-internal loopback expects 401) ГўвӮ¬вҖқ passive regression gate
    - 7c2c7e5 ГўвӮ¬вҖқ tests/e2e/basic-auth-challenge.spec.js DSHB_ALLOWLISTED_RUNNER env guard (consistent with existing DSHB_BASIC_USER/PASS pattern)

    Scope pivot from original: rate-limit approach REJECTED in favour of binary allowlist. Rationale: single-user service + rate-limit risks lockout-DoS if home IP rotates; network exclusion at allowlisted sources eliminates brute-force attack surface entirely (no throttling needed).

    Trust chain discovery via runner workflow_dispatch (temporary diagnose step, reverted in 7c2c7e5): host proxy = nginxproxy/nginx-proxy:1.7.1 (jwilder fork) injects X-Forwarded-For via stock default.conf. Docker web network 172.19.0.0/16. nginx-proxy container IP 172.19.0.11/16. Narrowed trust to /32 per Beta blocker (not /16 ГўвӮ¬вҖқ would trust all 17+ co-tenant containers on web network).

    Process stats: Alpha+Beta pre-exec (naive plan) = FAIL + CONDITIONAL. Discovery via runner surfaced XFF facts. Alpha+Beta pre-exec refined = CONDITIONAL ГғвҖ” 2 with 7 remediations integrated. Hostile post-exec = CONDITIONAL ГўвҖ вҖҷ 1 blocker remediated (auth spec env guard) + 3 warnings (discovery step reverted, SECURITY-BOUNDARY drift noted, spec comment drift noted).

    Residual risk accepted: intra-allowlist brute-force from compromised home device or stolen WG peer key ГўвӮ¬вҖқ acceptable per single-user threat model. Fail2ban on VPS as optional additional layer (host-level, out of DSHB repo scope).

    Pending verification (Andrei): WG smoke test ГўвӮ¬вҖқ confirm 10.0.0.X peer traffic is not SNAT'd before reaching nginx-proxy. If WG peers get 403, home IP is canonical fallback.

    Evidence: commits above + live production post-deploy verification (external 401 from home IP, external 403 from runner hairpin, container-internal 401 from loopback). Deploy.yaml health check green in run 24781075605.

    Closes: T-05 to RESOLVED in THREAT-REGISTER. P0 open count: 1 ГўвҖ вҖҷ 0. Ecosystem dashboard: ZERO P0 open after this.
