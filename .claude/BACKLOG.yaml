  notes: |
    SHIPPED 20.04.2026: commit `37d55f3` on underground-deployment-ready.

    Implementation:
    - @astrojs/sitemap serialize hook in astro.config.mjs.
    - BILINGUAL_GROUPS map lists 6 twin pairs: 4 legal docs + both legal indexes + longform Organizatsiya.
    - Each pair expands into 3 xhtml:link alternate entries (ru, en, x-default=RU) attached to both the RU and EN URL entries.
    - Single-language URLs (homepage, 50x, investigations, longform index) left without alternates.
    - Maintenance: add new translated twins to BILINGUAL_GROUPS. Content-collection-driven version deferred ГўвӮ¬вҖқ overkill for 6-pair corpus.

    Verified: dist/sitemap-0.xml contains xhtml:link rel="alternate" inside every bilingual url block. Build 18 pages / 0 errors / 0 warnings.

    Surfaced during ORGA-052 plan v3 synthesis (Beta W5). Closed follow-up after ORGA-055 RU legal migration expanded the bilingual URL corpus from 1 to 6 pairs.

    Problem: @astrojs/sitemap emits URLs but no `<xhtml:link rel="alternate">` per URL for bilingual longforms. Google multilingual crawl works via in-page hreflang (already shipped in ORGA-052) but sitemap alternate links improve crawl efficiency and clustering.

    Options:
    1. Use @astrojs/sitemap i18n option ГўвӮ¬вҖқ requires Astro built-in i18n routing; our slugs use language-prefix convention (not Astro i18n), so not directly compatible.
    2. Use `serialize` hook with URL ГўвҖ вҖҷ alternates map built at config time. Hardcoded for current entries, brittle for future. OK for MVP.
    3. Build dynamic map by scanning content collection frontmatter at config-load time (requires gray-matter or similar).

    Recommendation: Option 2 for MVP with comment "update when adding translated longforms"; migrate to Option 3 when 3+ translated entries exist.

    Not blocking: in-page hreflang (shipped ORGA-052) is primary SEO signal. Sitemap alt-links = optimization.
