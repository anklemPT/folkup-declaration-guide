- id: INFR-272
  project: INFR
  title: "Fix sops --extract syntax in Test-SopsAvailable (broken in sops 3.11)"
  priority: P3
  status: done
  category: infra
  notes: |
    Discovered session #15 (2026-04-22) during INFR-269 `check` smoke test. Pre-existing bug in vault/scripts/bastion-access.ps1 Test-SopsAvailable:
    `$testDecrypt = sops -d $REGISTRY_FILE --extract '["metadata"]' 2>&1`
    On sops 3.11, this emits warning "More than one positional argument provided" and the smoke decryption test FAILs even though sops itself can decrypt fine.
    Resolved 2026-04-23 (session #16). Discovery during fix: TWO bugs stacked, not one.
    - Bug A (the one in BACKLOG): argument order â€” sops 3.11 wants `--extract` BEFORE the file. Reordering removes the warning.
    - Bug B (latent, only surfaced after Bug A fix): PowerShell native-exe argument passing strips the inner double-quotes inside `'["metadata"]'`, so sops parses the path as `[metadata]` (array index, not string key) and fails with `strconv.Atoi: parsing "metadata": invalid syntax`. Bash-tested syntax does NOT translate to PS-invoked sops cleanly.
    Both bugs sidestepped by dropping `--extract` entirely: `sops -d $REGISTRY_FILE 2>&1 | Out-Null` + `$LASTEXITCODE` check. Plaintext piped to Out-Null (never lingers in a variable). Smoke test intent ("can SOPS decrypt this file?") preserved â€” actually stronger now (full decrypt vs partial).
    Smoke PASS 3/3: `check` (SOPS: OK), `check -Offline` (SOPS: OK + SSH: SKIPPED), `backup -DryRun` (no regression).
    Cross-session memory updated: reference_powershell_native_exe_pipeline_utf8.md needs an addendum about quote-stripping in --extract args (separate task or fold into existing memory).
  date_created: '2026-04-22'
  date_updated: '2026-04-23'
  date_completed: '2026-04-23'

