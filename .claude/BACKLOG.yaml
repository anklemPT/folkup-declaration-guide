- id: DSHB-051
  project: DSHB
  title: "T-26 residual: server-side branch protection decision รขโฌโ DECIDED client-only"
  priority: P2
  status: done
  category: security
  notes: |
    Decision 2026-04-22: **Option 2 accepted รขโฌโ client-only mitigation (DSHB-049 Path A) deemed sufficient.** Team plan $4/mo upgrade declined.

    Rationale (Andrei, 2026-04-22): single-user threat model. Laptop compromise is game-over regardless of server-side push-time enforcement รขโฌโ attacker with shell access can read `.htpasswd`, source code, session cookies, SSH keys directly. Server-side check (rulesets + required signed commits) would only stop stolen-GitHub-token-without-laptop-access scenario, which is already blocked by DSHB-049 Path A client-side signature requirement + pre-push validator.

    Accepted residual: attacker needs BOTH GitHub token AND shell access to Andrei's laptop. Public repo option also rejected (exposes nginx defense topology + deploy.yaml secret file paths).

    THREAT-REGISTER updated (commit 3a9f22e): T-26 body + summary row + priority counts + Top 5 concerns all reflect accepted-residual status. Re-evaluate via new DSHB-0xx ticket if ecosystem scales to multi-user.

    Outcome: ZERO P0 + ZERO P1-action-needed in ecosystem-dashboard threat register. Banking-level security posture + strategic risk acceptance formally documented.
