    (3) Init รขโฌโ รยฝรยฐ รยรโรโฌรยฐรยฝรยธรโ รยต รยทรยฐรยณรโฌรฦรยทรยบรยธ รโกรยธรโรยฐรโรล localStorage + system preference (prefers-color-scheme: dark) รยตรยรยปรยธ รยฝรยธรโกรยตรยณรยพ รยฝรยตรโ.
    (4) รโรยธรยดรยธรยผรยพรยรโรล รขโฌโ toggle รยดรยพรยปรยถรยตรยฝ รยฑรโนรโรล รโ sticky header (รยรยผ. EXPANDED รยฝรยธรยถรยต), รยฒรยรยตรยณรยดรยฐ รยฒรยธรยดรยตรยฝ.
    (5) i18n รขโฌโ labels รโกรยตรโฌรยตรยท {{ T "light" }} / {{ T "dark" }}, ru/en รยฟรยตรโฌรยตรยฒรยพรยดรโน.

