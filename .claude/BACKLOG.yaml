  notes: |
    BLOCKED 2026-04-25: pre-execution audit discovered this is NOT a mechanical token swap รขโฌโ it's a brand-reconciliation task requiring รยครยพรยฝรยฐรโฌรโฐรยธรยบ decision.

    Scope: 98 usages of --color-* across 6 consumers:
    (1) layouts/partials/typography.css รขโฌโ 26 sites (rendered every page)
    (2) layouts/shortcodes/plate.html รขโฌโ 3 sites
    (3) layouts/shortcodes/chapter-break.html รขโฌโ 2 sites
    (4) layouts/shortcodes/chapter-visual.html รขโฌโ 17 sites
    (5) layouts/shortcodes/concept-illustration.html รขโฌโ 29 sites (DECL-007-relevant)
    (6) layouts/shortcodes/figure-ref.html รขโฌโ 21 sites

    LIGHT-MODE VALUE DELTAS (7 of 15 tokens รขโฌโ blindly swapping to --folkup-* changes visual output):

    | Legacy --color-* | Legacy light hex | Canonical --folkup-* | Canonical light hex | Delta |
    |------------------|------------------|----------------------|---------------------|-------|
    | --color-text-primary | #2A2725 | --folkup-charcoal | #2A2825 | off 1 ch |
    | --color-text-secondary | #4A453F | --folkup-text | #2A2725 | very different (secondary was lighter) |
    | --color-accent-dark | #5E333C | --folkup-bordeaux-dark | #5C3038 | off 4 |
    | --color-bg-secondary | #F5F2EC | --folkup-surface | #F0EDE8 | ~2 levels darker |
    | --color-border | #E0DCD4 | --folkup-border | #DCD7D0 | off 4 |
    | --color-border-light | #F0EDE8 | --folkup-border-light | #E8E4DE | off ~8 |
    | --color-border-dark | #C9C3B9 | (.dark re-aliases to folkup-text-muted) | n/a | huge รขโฌโ light-mode border-dark was LIGHTER than text-muted in legacy |

    MATCHING (8 tokens): --color-text-muted, --color-accent, --color-accent-light/-decorative/-text, --color-bg-primary, --color-bg-muted, --color-focus (keep literal for a11y).

    DARK mode OK: .dark block in typography-classical.css explicitly re-aliases --color-* -> --folkup-*, so swap preserves dark behavior across all 15 tokens.

    DECISION FORKS for รยครยพรยฝรยฐรโฌรโฐรยธรยบ:
    (A) Accept light deltas as brand consolidation รขโฌโ visual sign-off + QA spot-check across all 6 consumers in LIGHT mode (multiple chapters + homepage + legal pages)
    (B) Preserve legacy light values via monograph :root override in palette-d.css รขโฌโ same pattern as A5+ sage dark override, but for 7 tokens in :root. Migration proceeds, compat bridge prunes, but monograph-specific light overrides added to canonical.
    (C) Hybrid: accept some deltas, preserve others (per-token brand judgment)

    Until รยครยพรยฝรยฐรโฌรโฐรยธรยบ dispatches verdict, compat bridge stays รขโฌโ harmless (all current deploys green: AGIL-114 Phase A merged, AGIL-117 merged).

    Validate post-migration: axe 0, Lighthouse a11y รขโฐยฅ 1.00, WCAG math on 7 delta tokens both modes, manual light+dark spot-check across 6 consumers. Preserve AGIL-114 A5+ --folkup-text-muted #A3B898 sage override per BRAND-GUIDE.md รยง3.4.

    Precedent: AGIL-114 A5+ (2026-04-24) was similar brand reconciliation that required รยครยพรยฝรยฐรโฌรโฐรยธรยบ HYBRID ruling. Expect same process here.

- id: AGIL-118
  project: AGIL
  title: "Dark mode readability emergency รขโฌโ text รยฟรยพรโกรโรยธ รยฝรยตรยฒรยธรยดรยธรยผ รยฝรยฐ live, math-รยฟรโฌรยพรยฒรยตรโฌรยบรยฐ รยฝรยต รยพรโรโฌรยฐรยถรยฐรยตรโ รโฌรยตรยฐรยปรลรยฝรยพรยรโรล"
  priority: P0
  status: done
  category: frontend
  date_created: '2026-04-25'
  date_updated: '2026-04-26'
  date_completed: '2026-04-26'
  evidence: |
    PR #44 merged commit 1af6d09. CI 4/4 PASS (build, quality-gates, deploy-vps, smoke-test).
    Live verify: HTTP 200 รยฝรยฐ chapter-3-holmes + new CSS + 3 woff2 (cyrillic 12K + latin-ext 13K + latin 23K = 48KB).
    `#ede8dd` รยฟรโฌรยธรยรฦรโรยรโรยฒรฦรยตรโ รยฒ live minified CSS.
